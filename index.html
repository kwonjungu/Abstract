<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>우리 동네 3D 추상화 스튜디오</title>
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="bar">
    <strong class="title">🏙️ 우리 동네 3D 스튜디오</strong>
    <div class="g"><span class="l">건물</span>
      <button class="pal on" data-type="집" data-emoji="🏠">🏠</button>
      <button class="pal" data-type="건물" data-emoji="🏢">🏢</button>
      <button class="pal" data-type="학교" data-emoji="🏫">🏫</button>
      <button class="pal" data-type="마트" data-emoji="🛒">🛒</button>
      <button class="pal" data-type="병원" data-emoji="🏥">🏥</button>
    </div>
    <div class="g"><span class="l">크기</span>
      <label class="f">가로<input type="number" id="bw" value="2" min="1" max="8"></label>
      <label class="f">세로<input type="number" id="bd" value="2" min="1" max="8"></label>
      <label class="f">높이<input type="number" id="bh" value="3" min="1" max="12"></label>
    </div>
    <div class="g"><span class="l">도구</span>
      <button data-tool="build" class="on">🧱 짓기</button>
      <button data-tool="road">🛣️ 길</button>
      <button data-tool="erase">🧽 지우기</button>
    </div>
    <div class="g"><span class="l">격자</span>
      <label class="f"><input type="number" id="gridN" value="25" min="8" max="48">칸</label>
    </div>
    <div class="g">
      <button id="topview">⬇️ 평면</button>
      <button id="reset">🎥 시점</button>
      <button id="undo">↶</button>
      <button id="png">🖼️</button>
      <button id="clr">🗑️</button>
    </div>
  </div>

  <canvas id="cv"></canvas>

  <div id="hud">드래그=회전 · 휠=확대 · 클릭=짓기 · 우클릭=지우기 &nbsp;|&nbsp; 칸 (<span id="cell">-</span>)</div>
  <div id="err">WebGL을 사용할 수 없는 환경입니다. 다른 브라우저에서 열어주세요.</div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
